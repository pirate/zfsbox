services:
  zfsbox:
    image: "${ZFSBOX_IMAGE:-ghcr.io/pirate/zfsbox:latest}"
    pull_policy: missing
    environment:
      VM_SSH_PORT: "${VM_SSH_PORT:-12022}"
      VM_NFS_PORT: "${VM_NFS_PORT:-12049}"
    cap_add:
      - SYS_ADMIN
    ports:
      - "127.0.0.1:${VM_SSH_PORT:-12022}:${VM_SSH_PORT:-12022}"
      - "127.0.0.1:${VM_NFS_PORT:-12049}:${VM_NFS_PORT:-12049}"
    command: ["sleep", "infinity"]
    working_dir: /data
    volumes:
      - ./data:/data
